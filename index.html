<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Player — Ultimate</title>
<style>
    :root {
        --bg-color: #050505;
        --card-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --text-main: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.5);
        --accent-1: #7C5CFF; /* Purple */
        --accent-2: #00E5A8; /* Teal */
        --gradient: linear-gradient(135deg, var(--accent-2), var(--accent-1));
    }

    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
    
    body {
        margin: 0;
        height: 100vh;
        background-color: var(--bg-color);
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(124, 92, 255, 0.15), transparent 25%),
            radial-gradient(circle at 85% 30%, rgba(0, 229, 168, 0.1), transparent 25%);
        color: var(--text-main);
        font-family: 'Inter', 'Microsoft JhengHei', system-ui, sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* === 排版佈局 === */
    .wrap {
        display: flex;
        width: 95%;
        max-width: 1100px;
        height: 85vh;
        gap: 20px;
        position: relative;
        z-index: 10;
    }

    .panel {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
    }

    /* === 左側：播放清單 === */
    #left { width: 300px; }
    
    .list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--glass-border);
    }
    
    .playlist-scroll {
        flex: 1;
        overflow-y: auto;
        padding-right: 4px;
    }
    
    /* 自訂捲軸 */
    .playlist-scroll::-webkit-scrollbar { width: 4px; }
    .playlist-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .track-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
        background: rgba(255,255,255,0.01);
    }

    .track-item:hover { background: rgba(255,255,255,0.05); }
    .track-item.active {
        background: rgba(124, 92, 255, 0.15);
        border-color: rgba(124, 92, 255, 0.4);
    }

    .track-info { display: flex; flex-direction: column; overflow: hidden; }
    .track-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
    .track-dur { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    
    .btn-group { margin-top: 16px; display: flex; gap: 10px; }
    
    .btn-file {
        flex: 1;
        background: var(--gradient);
        color: #000;
        font-weight: 800;
        border-radius: 50px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        font-size: 14px;
        transition: transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }
    .btn-file:active { transform: scale(0.98); }
    .btn-ghost {
        background: transparent;
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        padding: 0 16px;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-ghost:hover { border-color: #ff5c5c; color: #ff5c5c; }

    /* === 中間：視覺與資訊 === */
    #center { flex: 1; align-items: center; justify-content: center; text-align: center; position: relative; }
    
    #musicBall {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: var(--gradient);
        box-shadow: 0 0 60px rgba(124, 92, 255, 0.3);
        margin: 40px 0;
        transition: transform 0.05s ease-out;
        position: relative;
    }
    
    /* 玻璃球反光效果 */
    #musicBall::after {
        content: '';
        position: absolute;
        top: 20px; left: 30px;
        width: 40px; height: 20px;
        border-radius: 50%;
        background: rgba(255,255,255,0.3);
        transform: rotate(-45deg);
    }

    #currentTitle { font-size: 24px; font-weight: 700; margin-bottom: 8px; max-width: 90%; }
    #currentTimeDisplay { font-family: monospace; font-size: 16px; color: var(--accent-2); background: rgba(0, 229, 168, 0.1); padding: 4px 12px; border-radius: 20px; }

    /* === 右側：控制面板 === */
    #right { width: 260px; justify-content: center; gap: 30px; }

    .control-row { display: flex; justify-content: center; gap: 20px; align-items: center; }
    
    .ctrl-btn {
        background: none;
        border: none;
        color: var(--text-main);
        cursor: pointer;
        transition: 0.2s;
        padding: 10px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: var(--accent-2); }
    .ctrl-btn.big {
        width: 70px; height: 70px;
        background: var(--gradient);
        color: #000;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .ctrl-btn.big:hover { transform: scale(1.05); box-shadow: 0 15px 25px rgba(0,0,0,0.4); color: #000; }
    
    .mode-btn { font-size: 12px; color: var(--accent-1); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

    /* 滑桿樣式 */
    .slider-container { width: 100%; padding: 0 10px; }
    .label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: block; }
    
    input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px; width: 16px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 10px rgba(255,255,255,0.5);
        margin-top: -5px; 
    }

    /* === 底部：頻譜 Visualizer === */
    #spectrumWrap {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 120px;
        pointer-events: none;
        z-index: 1;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 4px;
        padding-bottom: 0;
        opacity: 0.5;
        mask-image: linear-gradient(to top, black, transparent);
        -webkit-mask-image: linear-gradient(to top, black, transparent);
    }
    .bar {
        width: 10px;
        background: linear-gradient(to top, var(--accent-1), var(--accent-2));
        border-radius: 5px 5px 0 0;
        transition: height 0.05s ease;
        min-height: 4px;
    }

    /* RWD */
    @media(max-width: 900px){
        .wrap { flex-direction: column; height: auto; padding: 20px 0; overflow-y: auto; }
        #left, #right, #center { width: 100%; height: auto; }
        #musicBall { width: 120px; height: 120px; margin: 20px 0; }
        .panel { margin-bottom: 12px; }
        body { overflow-y: auto; display: block; height: auto; }
        #spectrumWrap { position: fixed; bottom: 0; height: 80px; }
    }
</style>
</head>
<body>

<div class="wrap">
    
    <div id="left" class="panel">
        <div class="list-header">
            <span>播放清單</span>
            <span style="font-size:12px;color:var(--text-muted)" id="trackCount">0 首歌曲</span>
        </div>
        <div class="playlist-scroll" id="playlistArea">
            <div style="text-align:center; padding:40px 0; color:var(--text-muted); font-size:13px;">
                點擊下方按鈕<br>加入音樂檔案
            </div>
        </div>
        <div class="btn-group">
            <label class="btn-file">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                新增音樂
                <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">
            </label>
            <button class="btn-ghost" id="clearBtn" title="清空清單">🗑</button>
        </div>
    </div>

    <div id="center" class="panel">
        <div id="currentTitle">Glass Player</div>
        <div id="currentTimeDisplay">00:00 / 00:00</div>
        <div id="musicBall"></div>
    </div>

    <div id="right" class="panel">
        <button class="mode-btn" id="modeBtn">循環播放: 全部</button>
        
        <div class="control-row">
            <button class="ctrl-btn" id="prevBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="3"></line></svg>
            </button>
            <button class="ctrl-btn big" id="playBtn">
                <svg id="iconPlay" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="iconPause" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <button class="ctrl-btn" id="nextBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="3"></line></svg>
            </button>
        </div>

        <div class="slider-container">
            <span class="label">進度</span>
            <input type="range" id="progressSlider" value="0" min="0" max="100">
        </div>

        <div class="slider-container">
            <span class="label">音量</span>
            <input type="range" id="volSlider" value="0.8" min="0" max="1" step="0.01">
        </div>
    </div>
</div>

<div id="spectrumWrap"></div>

<audio id="audioPlayer" crossorigin="anonymous"></audio>

<script>
    // === 變數宣告 ===
    const fileInput = document.getElementById('fileInput');
    const playlistArea = document.getElementById('playlistArea');
    const audio = document.getElementById('audioPlayer');
    const titleEl = document.getElementById('currentTitle');
    const timeEl = document.getElementById('currentTimeDisplay');
    const playBtn = document.getElementById('playBtn');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressSlider = document.getElementById('progressSlider');
    const volSlider = document.getElementById('volSlider');
    const modeBtn = document.getElementById('modeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const trackCountEl = document.getElementById('trackCount');
    const musicBall = document.getElementById('musicBall');
    const spectrumWrap = document.getElementById('spectrumWrap');

    let tracks = [];
    let currentIdx = -1;
    let isPlaying = false;
    let mode = 'all'; // 'all', 'one', 'shuffle'
    
    // Audio Context 相關
    let audioCtx, analyser, source, dataArray;
    let animationId;
    let isAudioCtxInit = false;

    // === 初始化頻譜條 ===
    const BAR_COUNT = 60;
    for(let i=0; i<BAR_COUNT; i++){
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.width = `calc(100% / ${BAR_COUNT} - 4px)`;
        bar.style.height = '4px';
        spectrumWrap.appendChild(bar);
    }
    const bars = document.querySelectorAll('.bar');

    // === 音頻視覺化邏輯 ===
    function initAudioContext() {
        if(isAudioCtxInit) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256; // 頻率精度
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isAudioCtxInit = true;
            renderVisualizer();
        } catch(e) {
            console.error("Audio Context Init Failed:", e);
        }
    }

    function renderVisualizer() {
        animationId = requestAnimationFrame(renderVisualizer);
        if(!analyser) return;

        analyser.getByteFrequencyData(dataArray);

        // 1. 更新底部頻譜
        const step = Math.floor(dataArray.length / BAR_COUNT);
        let bassTotal = 0;
        
        for (let i = 0; i < BAR_COUNT; i++) {
            const value = dataArray[i * step];
            const height = Math.max(4, (value / 255) * 120);
            bars[i].style.height = height + 'px';
            
            // 計算低音 (前幾條)
            if(i < 8) bassTotal += value;
        }

        // 2. 更新 Music Ball 跳動效果 (基於低音)
        const bassAvg = bassTotal / 8;
        const scale = 1 + (bassAvg / 255) * 0.4; // 1.0 ~ 1.4
        musicBall.style.transform = `scale(${scale})`;
        
        // 增加顏色旋轉效果
        musicBall.style.filter = `hue-rotate(${bassAvg}deg)`;
    }

    // === 播放清單功能 ===
    fileInput.addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if(files.length === 0) return;

        files.forEach(file => {
            const url = URL.createObjectURL(file);
            tracks.push({ name: file.name.replace(/\.[^/.]+$/, ""), url: url });
        });
        
        renderPlaylist();
        
        // 如果是第一批加入的歌，自動載入第一首
        if(currentIdx === -1 && tracks.length > 0) {
            loadTrack(0, false); // 不自動播，等待用戶點擊
        }
        
        this.value = ''; // 重置 input 以便重複選取
    });

    function renderPlaylist() {
        playlistArea.innerHTML = '';
        trackCountEl.textContent = `${tracks.length} 首歌曲`;
        
        if(tracks.length === 0) {
            playlistArea.innerHTML = '<div style="text-align:center; padding:40px 0; color:var(--text-muted); font-size:13px;">清單已空</div>';
            return;
        }

        tracks.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = `track-item ${index === currentIdx ? 'active' : ''}`;
            div.innerHTML = `
                <div class="track-info">
                    <div class="track-name">${index + 1}. ${track.name}</div>
                </div>
            `;
            div.onclick = () => loadTrack(index, true);
            playlistArea.appendChild(div);
        });
    }

    // === 播放核心控制 ===
    function loadTrack(index, autoPlay = true) {
        if(index < 0 || index >= tracks.length) return;
        
        currentIdx = index;
        audio.src = tracks[index].url;
        titleEl.textContent = tracks[index].name;
        
        // 更新 UI 狀態
        renderPlaylist();
        
        if(autoPlay) {
            playAudio();
        } else {
            updatePlayBtnUI(false);
        }
    }

    function playAudio() {
        // 瀏覽器政策：必須有互動才能啟動 AudioContext
        initAudioContext();
        if(audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        audio.play().then(() => {
            isPlaying = true;
            updatePlayBtnUI(true);
        }).catch(err => console.log('播放被阻擋或失敗', err));
    }

    function pauseAudio() {
        audio.pause();
        isPlaying = false;
        updatePlayBtnUI(false);
        musicBall.style.transform = 'scale(1)'; // 重置球體
    }

    function updatePlayBtnUI(playing) {
        if(playing) {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
        } else {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
        }
    }

    playBtn.onclick = () => {
        if(tracks.length === 0) return;
        if(audio.paused) playAudio();
        else pauseAudio();
    };

    // === 切換歌曲 ===
    function nextTrack() {
        if(tracks.length === 0) return;
        if(mode === 'shuffle') {
            let next = Math.floor(Math.random() * tracks.length);
            loadTrack(next, true);
        } else if (mode === 'one') {
            audio.currentTime = 0;
            playAudio();
        } else {
            // All loop
            let next = currentIdx + 1;
            if(next >= tracks.length) next = 0;
            loadTrack(next, true);
        }
    }

    function prevTrack() {
        if(tracks.length === 0) return;
        let prev = currentIdx - 1;
        if(prev < 0) prev = tracks.length - 1;
        loadTrack(prev, true);
    }

    nextBtn.onclick = nextTrack;
    prevBtn.onclick = prevTrack;
    audio.addEventListener('ended', nextTrack);

    // === 進度條與時間 ===
    audio.addEventListener('timeupdate', () => {
        if(!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressSlider.value = pct;
        timeEl.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        
        // 讓滑桿背景漸變
        progressSlider.style.background = `linear-gradient(to right, var(--accent-2) ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
    });

    progressSlider.addEventListener('input', (e) => {
        if(!audio.duration) return;
        const time = (e.target.value / 100) * audio.duration;
        audio.currentTime = time;
    });

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    // === 音量 ===
    volSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // === 模式切換 ===
    modeBtn.onclick = () => {
        if(mode === 'all') {
            mode = 'one';
            modeBtn.textContent = '循環: 單曲';
            modeBtn.style.color = '#fff';
        } else if(mode === 'one') {
            mode = 'shuffle';
            modeBtn.textContent = '模式: 隨機';
            modeBtn.style.color = 'var(--accent-2)';
        } else {
            mode = 'all';
            modeBtn.textContent = '循環: 全部';
            modeBtn.style.color = 'var(--accent-1)';
        }
    };

    // === 清空 ===
    clearBtn.onclick = () => {
        audio.pause();
        audio.src = '';
        tracks = [];
        currentIdx = -1;
        isPlaying = false;
        titleEl.textContent = 'Glass Player';
        timeEl.textContent = '00:00 / 00:00';
        updatePlayBtnUI(false);
        renderPlaylist();
        musicBall.style.transform = 'scale(1)';
    };

</script>
</body>
</html>
